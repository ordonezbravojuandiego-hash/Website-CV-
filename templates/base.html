<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{% endblock %}</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
    crossorigin="anonymous"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       ESTILO CANCHERO CORPORATIVO (REVISADO)
       ========================================= */

    :root {
        --bg-body: #ffffff;
        --bg-panel: #f9fafb;
        --text-main: #111827;
        --text-muted: #6b7280;
        --accent-blue: #0056b3; 
        --border-color: #e5e7eb;
        --panel-shadow: 0 15px 40px rgba(0, 0, 0, 0.04);
        --border-radius-main: 24px;
    }

    body {
        background-color: var(--bg-body) !important;
        color: var(--text-main);
        font-family: 'Poppins', sans-serif;
        -webkit-font-smoothing: antialiased;
        padding-top: 80px;
    }

    section { padding: 60px 0; }
    [id] { scroll-margin-top: 100px; }

    /* --- NAVBAR CON EFECTO HOVER --- */
    /* VUELVE AL ORIGINAL: Blur de 12px y fondo 0.8 */
    .navbar {
        background-color: rgba(255, 255, 255, 0.8) !important;
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-color);
        transition: all 0.3s ease;
    }

    /* El nombre en la esquina */
    .navbar-brand { 
        font-weight: 700; 
        color: var(--text-main) !important;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .navbar-brand:hover {
        transform: scale(1.1);
        color: var(--accent-blue) !important;
    }

    /* Los links del menú */
    .nav-link { 
        font-weight: 500; 
        color: var(--text-muted) !important;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
    }
    
    .nav-link:hover {
        color: var(--accent-blue) !important;
        transform: translateY(-3px); /* Se eleva un poquito */
    }

    /* --- Hero Section --- */
    .hero h1 {
        font-size: 3.5rem;
        font-weight: 800;
        letter-spacing: -0.04em;
    }

    /* --- BOTONES CV --- */
    .cv-group { 
        gap: 6rem !important;
        margin-top: 3rem;
        display: flex;
        justify-content: center;
    }

    .btn-cv {
        background-color: transparent !important;
        color: var(--text-main) !important;
        border: 2px solid var(--border-color) !important;
        border-radius: 14px;
        padding: 14px 35px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-cv:hover {
        border-color: var(--accent-blue) !important;
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }
    .btn-cv .bi { color: var(--accent-blue) !important; margin-right: 10px; font-size: 1.2rem; }

    /* --- ICONO PROYECTOS --- */
    .hist-icon { width: 28px !important; height: 28px !important; color: var(--accent-blue) !important; flex-shrink: 0; display: inline-block; vertical-align: middle; }

    /* --- APARTADOS CON HOVER --- */
    .section-panel {
        background: var(--bg-panel);
        border-radius: var(--border-radius-main);
        padding: 60px;
        border: 1px solid rgba(0,0,0,0.02);
        box-shadow: var(--panel-shadow);
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .section-panel:hover {
        transform: scale(1.015);
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
        border-color: rgba(0, 86, 179, 0.15);
    }

    .edu-card { background: #ffffff; border: 1px solid var(--border-color) !important; border-radius: 18px; transition: all 0.4s ease; }
    .edu-card:hover { transform: translateY(-8px); border-color: var(--accent-blue) !important; }

    .bi { color: var(--accent-blue) !important; }

    /* --- CONTACTO --- */
    .contact-icon {
        width: 65px; height: 65px; display: flex; align-items: center; justify-content: center;
        border-radius: 50%; border: 1px solid var(--border-color); background: #fff;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .contact-icon:hover { background-color: var(--accent-blue); border-color: var(--accent-blue); transform: translateY(-8px) rotate(10deg); }
    .contact-icon:hover .bi { color: #fff !important; }

  </style>
</head>

<body data-bs-spy="scroll" data-bs-target="#navbarNav" data-bs-offset="100">

  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="#acerca">{{ global_["Last name"] }}</a>
      
      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto text-end pe-2 mt-3 mt-lg-0">
          <li class="nav-item"><a class="nav-link" href="#acerca">Acerca de Mí</a></li>
          <li class="nav-item"><a class="nav-link" href="#educacion">Educación</a></li>
          <li class="nav-item"><a class="nav-link" href="#experiencia">Experiencia</a></li>
          <li class="nav-item"><a class="nav-link" href="#proyectos">Proyectos</a></li>
          <li class="nav-item"><a class="nav-link" href="#certificaciones">Certificaciones</a></li>
          <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
