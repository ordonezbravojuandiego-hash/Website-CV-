<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{% endblock %}</title>

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
        crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
  
  <style>
    html { scroll-behavior: smooth; }
    /* Compensa la navbar fija */
    body { padding-top: 72px; }
    /* Espaciado vertical estándar para cada sección */
    section { padding: 56px 0; }
    @media (min-width: 992px) {
      section { padding: 72px 0; }
    }
    .card.rounded-4 { border-radius: 1rem; }

    /* Cuando hacés clic en la navbar, el título no queda tapado */
    [id] { scroll-margin-top: 84px; }

    /* Estilo/animación para los botones de contacto (clase 'contact-icon') */
    .contact-icon {
      transition: transform .15s ease, box-shadow .2s ease,
                  background-color .2s ease, color .2s ease, border-color .2s ease;
    }
    .contact-icon:hover, .contact-icon:focus {
      transform: translateY(-2px) scale(1.07);
      box-shadow: 0 10px 30px rgba(0,0,0,.15);
    }
    .contact-icon:hover {
      background-color: #212529; /* tono de navbar-dark */
      color: #fff !important;
      border-color: #212529;
    }

    /* --- Botones grandes: micro-pulido estético --- */
    .btn-lg { border-radius: .8rem; }
    .btn-lg .bi { vertical-align: -0.125rem; }

    /* Badge "En curso" con tono de marca */
    .badge.bg-warning.text-dark {
      background-color: #ffd966 !important; /* suave */
      color: #0b2742 !important;            /* tu azul oscuro */
    }
  </style>
</head>
<body data-bs-spy="scroll" data-bs-target="#navbarNav" data-bs-offset="80">

  <!-- NAVBAR fija -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#acerca">{{ global_["Last name"] }}</a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#acerca">Acerca de mí</a></li>
          <li class="nav-item"><a class="nav-link" href="#educacion">Educación</a></li>
          <li class="nav-item"><a class="nav-link" href="#certificaciones">Certificaciones</a></li>
          <li class="nav-item"><a class="nav-link" href="#proyectos">Proyectos Destacados</a></li>
          <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
          crossorigin="anonymous"></script>

  <!-- Inicialización de tooltips Bootstrap -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const triggers = document.querySelectorAll('[data-bs-toggle="tooltip"]');
      [...triggers].forEach(el => new bootstrap.Tooltip(el));
    });
  </script>
</body>
</html>
